<!doctype html>
<html lang="en" data-theme="warm">
  <head>
    <script>
(function(){
  try {
    var raw = localStorage.getItem('mirror-theme');
    if (!raw) return;
    var p = JSON.parse(raw);
    var t = p.state && p.state.theme;
    if (t === 'warm' || t === 'white' || t === 'black')
      document.documentElement.dataset.theme = t;
  } catch (e) {}
})();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#F6F1E8" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="preload" as="image" href="https://i.ibb.co/rGwn5grR/eea4dda1c6155fd114b1904896bef578.jpg" fetchpriority="high" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@1,9..144,300;1,9..144,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <title>Mirror Studio</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
